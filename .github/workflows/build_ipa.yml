name: Build and Release IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-13 # Specific version for stability
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build IPA
        run: |
          cd ios
          # Ensure pods are handled correctly by flutter build
          cd ..
          flutter build ipa --release --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
