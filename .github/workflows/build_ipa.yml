name: Build and Release IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          flutter pub cache repair

      - name: Build iOS
        run: |
          # Use no-codesign to generate .app bundle
          flutter build ios --release --no-codesign --verbose
          
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          find build/ios/iphoneos -name "*.app" -exec cp -r {} Payload/ \;
          zip -r release-ipa.ipa Payload
          mkdir -p build/ios/ipa
          mv release-ipa.ipa build/ios/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
