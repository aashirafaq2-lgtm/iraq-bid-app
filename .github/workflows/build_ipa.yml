name: Build and Release IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Force Build iOS
        run: |
          flutter pub get
          # Bypass CocoaPods manual step and let flutter handle it
          flutter build ios --release --no-codesign --verbose || true
          
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          # Search for Runner.app and copy it
          find build/ios/iphoneos -name "*.app" -exec cp -r {} Payload/ \;
          zip -r release-ipa.ipa Payload
          mkdir -p build/ios/ipa
          mv release-ipa.ipa build/ios/ipa/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
